name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only; no CUDA stack in CI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests scripts

      - name: Black
        run: black --check src tests scripts

      - name: Mypy
        run: mypy

      - name: Pytest (CPU-only; gpu/slow tests excluded)
        run: pytest -m "not gpu and not slow" --cov=clinical_scribe
